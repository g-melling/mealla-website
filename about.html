<!DOCTYPE html>
<html lang="en">
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <link href="styles.css" rel="stylesheet">
        <title>Mealla - About</title>
    </head>
<body>

    <nav>
        <div class="nav-left">
          <h1><a href="index.html" class="nav-home">MEALLA</a></h1>
        </div>
        <div class="nav-right">
          <a href="music.html">Music</a>
          <a href="tour.html">Tour</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </div>
    </nav>

<main>
    <section id="about">
  <h2>ABOUT</h2>
  <p id="typing"></p>
</section>
</main>

<div id="carouselExampleIndicators" class="carousel slide">
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
  </div>
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="img/mealla1.png" class="d-block w-100" alt="Mealla">
    </div>
    <div class="carousel-item">
      <img src="img/mealla2.png" class="d-block w-100" alt="Underwater Dreams">
    </div>
    <div class="carousel-item">
      <img src="img/mealla3.png" class="d-block w-100" alt="First Frost">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>

<footer>
  &copy; 2025 Lion Moose Media. All rights reserved.
</footer>

<script>
  const text = "Mealla is a London-based multi-instrumentalist and electronic music artist who weaves sound into story. She is drawn toward the shimmering worlds of ambient, post-jazz, and experimental music. Inspired by visionaries like Brian Eno, Nils Frahm, and John Cage, she crafts sonic landscapes — blending instruments, electronics, and the wild textures of nature into immersive, boundary-blurring soundscapes.";
  let i = 0;

  function typeWriter() {
    if (i < text.length) {
      document.getElementById("typing").innerHTML += text.charAt(i);
      i++;
      setTimeout(typeWriter, 70);
    }
  }

  window.onload = function () {
    typeWriter();

    const myCarousel = document.querySelector('#carouselExampleIndicators');
    const carousel = new bootstrap.Carousel(myCarousel, {
      interval: 4000,
      ride: 'carousel',
      pause: 'hover',
      wrap: true
    });

    myCarousel.addEventListener('click', () => {
      carousel.pause();
    });
  };
  </script>
</body>
</html>
